###########################################################################
### 기본 설정 
###########################################################################

###########################################################################
### Application 설정 
###########################################################################
application:
  # 인증완료 redirect url #
  frontend:
    scheme: http
    host: fennex.pro
    context: 
    port: 80
  gateway: http://api.fennex.pro

  # CORS 허용 도메인 #
  cors: 
    allowed-origin:
    - http://fennex.io
    - https://fennex.pro

###########################################################################
### server 설정 
###########################################################################
server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        secure: true
        same-site: lax
  error:
    whitelabel:
      enabled: false

###########################################################################
### Spring 설정 
###########################################################################
spring:
  application:
    name: fennex-gateway
    realm: fennex

  profiles:
    active: local

  ### Cloud 설정 ###
  webflux:
    base-path: 
  cloud:
    gateway:
      filter:
        retry:
          enabled: false

  ### Redis 설정 ###
  data:
    redis:
      host: 192.168.50.210
      port: 6379

  ### JPA 설정 ### 
  jpa:
    hibernate:
      ddl-auto: create # 테이블 유효성 검사
      naming.physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true

  ### Datasource 설정 ###
  r2dbc:
    url: r2dbc:postgresql://192.168.50.210:5432/home
    username: chris
    password: rotoRl12!@
    pool:
      initial-size: 5
      max-size: 5
      max-create-connection-time: 60000
      validation-depth: local
      validation-query: select 1
    properties:
      schema: public

  ### 웹 설정 ###
  web:
    resources:
      add-mappings: true
  sql:
    init:
      mode: never
      continue-on-error: true
  session:
    redis:
      flush-mode: immediate
      save-mode: on-set-attribute

  ### 보안 설정 ###
  security:
    ### OIDC 연동 설정 ###
    oauth2:
      client:
        provider:
          fennex:
            issuer-uri: https://kc.fennex.pro/realms/${spring.application.realm}
            jwk-set-uri: https://kc.fennex.pro/realms/${spring.application.realm}/protocol/openid-connect/certs
            user-name-attribute: sub
        registration:
          fennex:
            provider: fennex
            client-id: fennex-client
            client-secret: fennex-client
            #: "${application.gateway}/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            scope: openid

    access:
      free:
      - /favicon.ico
      - /actuator/**
      - /swagger/**
      - /swagger-ui/**

  ### 메시지 설정 ###
  messages:
    basename: messages/messages,
              messages/error-messages,
###########################################################################
### Logging 설정 
###########################################################################
logging:
  level:
    root: info
    lombok: info
    org:
      apache: info
      kafka: info
      postgresql: trace
    com:
      ulisesbocchio: debug
      cloud: 
        cloud: info
    io:        
      r2dbc: 
        postgresql: 
          QUERY: debug # for queries
          PARAM: debug # for parameters    
  file: 
    name: app/logs/${hostname}/${spring.application.name}.log
  pattern:
    console: "%d{HH:mm:ss.SSS} %clr(${LOG_LEVEL_PATTERN:-%5p}) %-10logger{0} %msg%n"
    file: "%d{HH:mm:ss.SSS} %-5level %-10logger{0} %msg%n"
  logback:
    rollingpolicy: 
      file-name-pattern: app/logs/${hostname}/${spring.application.name}.%d{yyyy-MM-dd}.%i.gz
      max-file-size: 100MB
      max-history: 15
      
###########################################################################
### Actuator 설정 
###########################################################################
management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: '*'

###########################################################################
### Swagger 설정 
###########################################################################
springdoc:
  swagger-ui:
    use-root-path: true
    path: /swagger
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /swagger/docs
    groups:
      enabled: true
  cache:
    disabled: true
  api-info:
    title: Gateway API
    description: Apis for Gateway
    version: 1.0.0
    terms-of-service: http://fennex.pro/termsofservice
    contact:
      name: Administrator
      url: https://fennex.pro
      email: admin@fennex.pro
    license:
      name: MIT License
      url: https://fennex.pro/license

###########################################################################
### Router data 설정 
###########################################################################
routers:
  defaults:
    description:
      context: description # 라우팅 소스 컨텍스트
      scheme: http # 라우팅 대상 스키마
      host: localhost # 라우팅 대상 주소 (ip/domain)
      port: 8080 # 라우팅 대상 포트
      prefix: test # 라우팅 대상 path의 맨 앞에 추가되는 path
      rewrite: explain/v1 # 라우팅 대상 컨텍스트
      remove-context: false # 컨텍스트 제거, true일 경우 prefix와 rewrite 무시
      skip-filters: true # 라우팅 필터 적용 유무, true일 경우 모든 GatewayFilter를 우회

###########################################################################
### Jasypt 설정 
###########################################################################
jasypt:
  encryptor:
    password: ${ENCRYPTOR_PROFILE}